<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">各家 SOTA Agent Prompt 能力与约束对比雷达</title>
  <desc id="desc">以概念化雷达图比较 Codex CLI、Claude Code、OpenClaw、opencode、Kimi CLI、Hermes Agent、Pi 在规划、工具、安全、上下文、自检和协作等维度的相对侧重。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfcfe"/>
      <stop offset="1" stop-color="#edf7f2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .base { font-family: "Inter", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .title { font-size: 34px; font-weight: 850; fill: #0f172a; letter-spacing: 0; }
      .subtitle { font-size: 17px; fill: #526173; }
      .axis { font-size: 16px; font-weight: 800; fill: #1e293b; }
      .hint { font-size: 13px; fill: #64748b; }
      .legend { font-size: 15px; font-weight: 750; fill: #1e293b; }
      .matrix-head { font-size: 14px; font-weight: 800; fill: #334155; }
      .matrix-cell { font-size: 13px; font-weight: 750; fill: #0f172a; }
      .note-title { font-size: 18px; font-weight: 850; fill: #0f172a; }
      .note { font-size: 14px; fill: #475569; }
      .tick { font-size: 12px; fill: #94a3b8; }
    </style>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <g class="base">
    <text class="title" x="64" y="70">各家 SOTA Agent Prompt 对比雷达</text>
    <text class="subtitle" x="66" y="104">概念化比较：看 prompt 更强调什么，而不是把分数当成产品排名</text>

    <rect x="48" y="132" width="712" height="532" rx="20" fill="#ffffff" stroke="#dbe7e2" filter="url(#shadow)"/>
    <g transform="translate(404 392)">
      <polygon points="0,-230 199,-115 199,115 0,230 -199,115 -199,-115" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
      <polygon points="0,-184 159,-92 159,92 0,184 -159,92 -159,-92" fill="none" stroke="#dbe3ea" stroke-width="1.5"/>
      <polygon points="0,-138 120,-69 120,69 0,138 -120,69 -120,-69" fill="none" stroke="#dbe3ea" stroke-width="1.5"/>
      <polygon points="0,-92 80,-46 80,46 0,92 -80,46 -80,-46" fill="none" stroke="#dbe3ea" stroke-width="1.5"/>
      <polygon points="0,-46 40,-23 40,23 0,46 -40,23 -40,-23" fill="none" stroke="#dbe3ea" stroke-width="1.5"/>

      <line x1="0" y1="0" x2="0" y2="-230" stroke="#d6e1e8" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="199" y2="-115" stroke="#d6e1e8" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="199" y2="115" stroke="#d6e1e8" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="0" y2="230" stroke="#d6e1e8" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="-199" y2="115" stroke="#d6e1e8" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="-199" y2="-115" stroke="#d6e1e8" stroke-width="1.5"/>

      <text class="axis" x="-32" y="-253">任务规划</text>
      <text class="axis" x="204" y="-122">工具协议</text>
      <text class="axis" x="207" y="127">安全约束</text>
      <text class="axis" x="-38" y="264">上下文治理</text>
      <text class="axis" x="-288" y="128">自检评估</text>
      <text class="axis" x="-282" y="-122">协作语气</text>

      <text class="tick" x="10" y="-47">1</text>
      <text class="tick" x="10" y="-93">2</text>
      <text class="tick" x="10" y="-139">3</text>
      <text class="tick" x="10" y="-185">4</text>
      <text class="tick" x="10" y="-231">5</text>

      <polygon points="0,-207 179,-104 159,92 0,184 -159,92 -179,-104" fill="#1f7a8c" fill-opacity="0.18" stroke="#1f7a8c" stroke-width="3"/>
      <polygon points="0,-184 159,-92 179,104 0,207 -139,81 -199,-115" fill="#8b5cf6" fill-opacity="0.14" stroke="#8b5cf6" stroke-width="3"/>
      <polygon points="0,-161 179,-104 159,92 0,207 -120,69 -159,-92" fill="#f59e0b" fill-opacity="0.15" stroke="#d97706" stroke-width="3"/>
      <polygon points="0,-184 139,-81 139,81 0,184 -159,92 -139,-81" fill="#10b981" fill-opacity="0.14" stroke="#059669" stroke-width="3"/>
      <polygon points="0,-161 159,-92 120,69 0,161 -100,58 -179,-104" fill="#ef4444" fill-opacity="0.13" stroke="#dc2626" stroke-width="3"/>
      <polygon points="0,-138 179,-104 139,81 0,161 -139,81 -159,-92" fill="#0ea5e9" fill-opacity="0.12" stroke="#0284c7" stroke-width="3"/>
      <polygon points="0,-92 80,-46 80,46 0,92 -80,46 -80,-46" fill="#64748b" fill-opacity="0.12" stroke="#64748b" stroke-width="3"/>

      <circle cx="0" cy="-207" r="4" fill="#1f7a8c"/>
      <circle cx="179" cy="-104" r="4" fill="#1f7a8c"/>
      <circle cx="159" cy="92" r="4" fill="#1f7a8c"/>
      <circle cx="0" cy="184" r="4" fill="#1f7a8c"/>
      <circle cx="-159" cy="92" r="4" fill="#1f7a8c"/>
      <circle cx="-179" cy="-104" r="4" fill="#1f7a8c"/>
    </g>

    <g transform="translate(808 142)">
      <rect x="0" y="0" width="330" height="274" rx="18" fill="#ffffff" stroke="#dbe7e2" filter="url(#shadow)"/>
      <text class="note-title" x="26" y="40">图例</text>
      <circle cx="34" cy="70" r="7" fill="#1f7a8c"/><text class="legend" x="52" y="76">Codex CLI：工程协作闭环强</text>
      <circle cx="34" cy="100" r="7" fill="#8b5cf6"/><text class="legend" x="52" y="106">Claude Code：harness 与编排强</text>
      <circle cx="34" cy="130" r="7" fill="#d97706"/><text class="legend" x="52" y="136">OpenClaw：工具生态与记忆强</text>
      <circle cx="34" cy="160" r="7" fill="#059669"/><text class="legend" x="52" y="166">opencode：高自主工作流强</text>
      <circle cx="34" cy="190" r="7" fill="#dc2626"/><text class="legend" x="52" y="196">Kimi CLI：计划模式清晰</text>
      <circle cx="34" cy="220" r="7" fill="#0284c7"/><text class="legend" x="52" y="226">Hermes：工具目录与委派强</text>
      <circle cx="34" cy="250" r="7" fill="#64748b"/><text class="legend" x="52" y="256">Pi：极简 baseline</text>
    </g>

    <g transform="translate(808 436)">
      <rect x="0" y="0" width="330" height="240" rx="18" fill="#ffffff" stroke="#dbe7e2" filter="url(#shadow)"/>
      <text class="note-title" x="24" y="39">阅读方式</text>
      <text class="note" x="24" y="75">1. 先看高分维度代表的 prompt 约束。</text>
      <text class="note" x="24" y="108">2. 再看低分维度是否由产品场景决定。</text>
      <text class="note" x="24" y="141">3. 最后把差异迁移到自己的 agent。</text>
      <line x1="24" y1="166" x2="306" y2="166" stroke="#e2e8f0"/>
      <text class="hint" x="24" y="197">建议配合真实任务回放使用：</text>
      <text class="hint" x="24" y="221">同一任务、同一工具、同一评测 rubric。</text>
    </g>

    <g transform="translate(92 612)">
      <rect x="0" y="0" width="622" height="28" rx="14" fill="#ecfdf5" stroke="#bbf7d0"/>
      <text class="hint" x="22" y="19">雷达是学习地图，不是排行榜：目标是抽取可复用的 prompt 设计模式。</text>
    </g>
  </g>
</svg>
