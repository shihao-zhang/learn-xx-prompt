<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">提示词分层模型</title>
  <desc id="desc">用中文展示 SOTA agent prompt 从任务意图、身份边界、工具协议、工作流、输出契约到评测反馈的分层结构。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef6f3"/>
    </linearGradient>
    <linearGradient id="stack" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1f7a8c"/>
      <stop offset="1" stop-color="#46a758"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f4f4f"/>
    </marker>
    <style>
      .base { font-family: "Inter", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .title { font-size: 38px; font-weight: 800; fill: #0f172a; letter-spacing: 0; }
      .subtitle { font-size: 18px; fill: #475569; }
      .layer-title { font-size: 21px; font-weight: 800; fill: #0f172a; }
      .layer-text { font-size: 15px; fill: #334155; }
      .side-title { font-size: 20px; font-weight: 800; fill: #0f172a; }
      .side-text { font-size: 15px; fill: #475569; }
      .tag { font-size: 13px; font-weight: 700; fill: #fff; }
      .small { font-size: 13px; fill: #64748b; }
      .index { font-size: 18px; font-weight: 900; fill: #fff; }
    </style>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <g class="base">
    <text class="title" x="70" y="78">提示词分层模型</text>
    <text class="subtitle" x="72" y="112">把各家 SOTA agent prompt 拆成可比较、可复刻、可评测的结构单元</text>

    <rect x="66" y="154" width="246" height="440" rx="18" fill="#ffffff" stroke="#d7e3df" filter="url(#softShadow)"/>
    <text class="side-title" x="92" y="194">输入侧：意图与上下文</text>
    <line x1="92" y1="214" x2="286" y2="214" stroke="#dbe8e4" stroke-width="2"/>
    <text class="side-text" x="92" y="252">任务目标</text>
    <text class="side-text" x="92" y="286">用户偏好</text>
    <text class="side-text" x="92" y="320">项目状态</text>
    <text class="side-text" x="92" y="354">可用工具</text>
    <text class="side-text" x="92" y="388">风险等级</text>
    <text class="small" x="92" y="450">关注点：不要把模型人格、</text>
    <text class="small" x="92" y="474">工具权限和输出格式混在一层。</text>
    <rect x="92" y="510" width="168" height="34" rx="17" fill="#1f7a8c"/>
    <text class="tag" x="117" y="532">先界定，再执行</text>

    <g filter="url(#softShadow)">
      <rect x="374" y="150" width="452" height="74" rx="16" fill="#e8f3f1" stroke="#b8d8d1"/>
      <rect x="374" y="234" width="452" height="74" rx="16" fill="#ecf7ee" stroke="#c0dec4"/>
      <rect x="374" y="318" width="452" height="74" rx="16" fill="#f1f5f9" stroke="#cbd5e1"/>
      <rect x="374" y="402" width="452" height="74" rx="16" fill="#fff7ed" stroke="#fed7aa"/>
      <rect x="374" y="486" width="452" height="74" rx="16" fill="#fef2f2" stroke="#fecaca"/>
      <rect x="374" y="570" width="452" height="74" rx="16" fill="#eef2ff" stroke="#c7d2fe"/>
    </g>

    <rect x="398" y="171" width="36" height="36" rx="10" fill="#1f7a8c"/>
    <text class="index" x="411" y="195">1</text>
    <text class="layer-title" x="452" y="180">任务意图层</text>
    <text class="layer-text" x="452" y="205">目标、完成定义、优先级、不可做事项</text>

    <rect x="398" y="255" width="36" height="36" rx="10" fill="#2f8f46"/>
    <text class="index" x="411" y="279">2</text>
    <text class="layer-title" x="452" y="264">身份与边界层</text>
    <text class="layer-text" x="452" y="289">角色、语气、安全规则、权限与拒绝条件</text>

    <rect x="398" y="339" width="36" height="36" rx="10" fill="#475569"/>
    <text class="index" x="411" y="363">3</text>
    <text class="layer-title" x="452" y="348">工具与环境层</text>
    <text class="layer-text" x="452" y="373">文件系统、浏览器、执行器、API 与调用协议</text>

    <rect x="398" y="423" width="36" height="36" rx="10" fill="#d97706"/>
    <text class="index" x="411" y="447">4</text>
    <text class="layer-title" x="452" y="432">工作流层</text>
    <text class="layer-text" x="452" y="457">计划、搜索、编辑、验证、汇报的循环节奏</text>

    <rect x="398" y="507" width="36" height="36" rx="10" fill="#dc2626"/>
    <text class="index" x="411" y="531">5</text>
    <text class="layer-title" x="452" y="516">输出契约层</text>
    <text class="layer-text" x="452" y="541">格式、引用、长度、语言、交付物和边界说明</text>

    <rect x="398" y="591" width="36" height="36" rx="10" fill="#4f46e5"/>
    <text class="index" x="411" y="615">6</text>
    <text class="layer-title" x="452" y="600">评测反馈层</text>
    <text class="layer-text" x="452" y="625">测试、rubric、自检、回放、持续改写提示词</text>

    <path d="M 326 372 C 344 372, 350 372, 366 372" fill="none" stroke="#2f4f4f" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M 834 372 C 856 372, 864 372, 884 372" fill="none" stroke="#2f4f4f" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="900" y="154" width="234" height="440" rx="18" fill="#ffffff" stroke="#d7e3df" filter="url(#softShadow)"/>
    <text class="side-title" x="928" y="194">输出侧：可观察行为</text>
    <line x1="928" y1="214" x2="1108" y2="214" stroke="#dbe8e4" stroke-width="2"/>
    <text class="side-text" x="928" y="252">主动澄清</text>
    <text class="side-text" x="928" y="286">分步计划</text>
    <text class="side-text" x="928" y="320">谨慎用工具</text>
    <text class="side-text" x="928" y="354">保护用户改动</text>
    <text class="side-text" x="928" y="388">验证后交付</text>
    <text class="small" x="928" y="450">比较 prompt 时，观察行为比</text>
    <text class="small" x="928" y="474">单句指令更稳定、更可迁移。</text>
    <rect x="928" y="510" width="152" height="34" rx="17" fill="#46a758"/>
    <text class="tag" x="955" y="532">用行为验证</text>

    <rect x="432" y="660" width="334" height="28" rx="14" fill="url(#stack)" opacity="0.92"/>
    <text class="tag" x="473" y="679">核心方法：分层阅读 → 横向对比 → 小任务复刻 → 评测迭代</text>
  </g>
</svg>
