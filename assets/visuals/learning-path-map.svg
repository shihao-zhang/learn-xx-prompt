<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">渐进学习路线：对比各家 SOTA Agent Prompt</title>
  <desc id="desc">展示从收集样本、分层标注、横向对比、复刻任务、评测回放到迁移改写的学习路径。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f9fbff"/>
      <stop offset="0.55" stop-color="#f4fbf7"/>
      <stop offset="1" stop-color="#fff8ed"/>
    </linearGradient>
    <linearGradient id="path" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1f7a8c"/>
      <stop offset="0.45" stop-color="#46a758"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="9" stdDeviation="11" flood-color="#0f172a" flood-opacity="0.11"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#257f75"/>
    </marker>
    <style>
      .base { font-family: "Inter", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .title { font-size: 36px; font-weight: 850; fill: #0f172a; letter-spacing: 0; }
      .subtitle { font-size: 17px; fill: #526173; }
      .stage-no { font-size: 18px; font-weight: 900; fill: #fff; }
      .stage-title { font-size: 21px; font-weight: 850; fill: #0f172a; }
      .stage-text { font-size: 14px; fill: #475569; }
      .artifact { font-size: 13px; font-weight: 750; fill: #1f5f64; }
      .lane-title { font-size: 18px; font-weight: 850; fill: #0f172a; }
      .lane-text { font-size: 14px; fill: #475569; }
      .small { font-size: 12px; fill: #64748b; }
    </style>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <g class="base">
    <text class="title" x="64" y="72">渐进学习路线：对比各家 SOTA Agent Prompt</text>
    <text class="subtitle" x="66" y="106">从“读懂别人怎么写”到“为自己的 agent 写出可验证的 prompt”</text>

    <path d="M 140 350 C 235 198, 365 198, 465 350 S 695 502, 800 350 S 1000 198, 1066 350" fill="none" stroke="url(#path)" stroke-width="14" stroke-linecap="round"/>
    <path d="M 140 350 C 235 198, 365 198, 465 350 S 695 502, 800 350 S 1000 198, 1066 350" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.65"/>

    <g filter="url(#shadow)">
      <rect x="68" y="258" width="188" height="164" rx="18" fill="#ffffff" stroke="#dbe7e2"/>
      <rect x="238" y="152" width="188" height="164" rx="18" fill="#ffffff" stroke="#dbe7e2"/>
      <rect x="408" y="258" width="188" height="164" rx="18" fill="#ffffff" stroke="#dbe7e2"/>
      <rect x="578" y="404" width="188" height="164" rx="18" fill="#ffffff" stroke="#dbe7e2"/>
      <rect x="748" y="258" width="188" height="164" rx="18" fill="#ffffff" stroke="#dbe7e2"/>
      <rect x="918" y="152" width="188" height="164" rx="18" fill="#ffffff" stroke="#dbe7e2"/>
    </g>

    <g>
      <circle cx="104" cy="294" r="21" fill="#1f7a8c"/>
      <text class="stage-no" x="98" y="301">1</text>
      <text class="stage-title" x="132" y="297">收集样本</text>
      <text class="stage-text" x="94" y="334">整理 system、developer、</text>
      <text class="stage-text" x="94" y="357">工具说明与输出规范。</text>
      <rect x="94" y="380" width="118" height="26" rx="13" fill="#e8f3f1"/>
      <text class="artifact" x="111" y="398">样本索引表</text>
    </g>

    <g>
      <circle cx="274" cy="188" r="21" fill="#2f8f46"/>
      <text class="stage-no" x="268" y="195">2</text>
      <text class="stage-title" x="302" y="191">分层标注</text>
      <text class="stage-text" x="264" y="228">标出角色、边界、工具、</text>
      <text class="stage-text" x="264" y="251">工作流和交付格式。</text>
      <rect x="264" y="274" width="118" height="26" rx="13" fill="#ecf7ee"/>
      <text class="artifact" x="281" y="292">分层切片</text>
    </g>

    <g>
      <circle cx="444" cy="294" r="21" fill="#475569"/>
      <text class="stage-no" x="438" y="301">3</text>
      <text class="stage-title" x="472" y="297">横向对比</text>
      <text class="stage-text" x="434" y="334">比较同一维度下的</text>
      <text class="stage-text" x="434" y="357">措辞强度与默认假设。</text>
      <rect x="434" y="380" width="118" height="26" rx="13" fill="#f1f5f9"/>
      <text class="artifact" x="451" y="398">差异矩阵</text>
    </g>

    <g>
      <circle cx="614" cy="440" r="21" fill="#d97706"/>
      <text class="stage-no" x="608" y="447">4</text>
      <text class="stage-title" x="642" y="443">复刻任务</text>
      <text class="stage-text" x="604" y="480">挑 3 个小任务，复现</text>
      <text class="stage-text" x="604" y="503">计划、工具和汇报节奏。</text>
      <rect x="604" y="526" width="118" height="26" rx="13" fill="#fff7ed"/>
      <text class="artifact" x="621" y="544">任务回放</text>
    </g>

    <g>
      <circle cx="784" cy="294" r="21" fill="#dc2626"/>
      <text class="stage-no" x="778" y="301">5</text>
      <text class="stage-title" x="812" y="297">评测回放</text>
      <text class="stage-text" x="774" y="334">用同一 rubric 检查</text>
      <text class="stage-text" x="774" y="357">质量、风险和稳定性。</text>
      <rect x="774" y="380" width="118" height="26" rx="13" fill="#fef2f2"/>
      <text class="artifact" x="791" y="398">评分记录</text>
    </g>

    <g>
      <circle cx="954" cy="188" r="21" fill="#4f46e5"/>
      <text class="stage-no" x="948" y="195">6</text>
      <text class="stage-title" x="982" y="191">迁移改写</text>
      <text class="stage-text" x="944" y="228">把高价值模式改写成</text>
      <text class="stage-text" x="944" y="251">适合自己项目的 prompt。</text>
      <rect x="944" y="274" width="124" height="26" rx="13" fill="#eef2ff"/>
      <text class="artifact" x="961" y="292">本地模板库</text>
    </g>

    <path d="M 170 512 L 1030 512" stroke="#d5e5df" stroke-width="2" marker-end="url(#arrow)"/>
    <text class="lane-title" x="92" y="617">每一轮都保留三件东西</text>
    <g transform="translate(322 586)">
      <rect x="0" y="0" width="190" height="52" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
      <text class="lane-text" x="22" y="32">原始 prompt 片段</text>
      <rect x="218" y="0" width="190" height="52" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
      <text class="lane-text" x="240" y="32">行为观察记录</text>
      <rect x="436" y="0" width="190" height="52" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
      <text class="lane-text" x="458" y="32">改写后的模板</text>
    </g>

    <text class="small" x="66" y="678">目标：从品牌差异中抽取可迁移的 agent prompt 设计模式，并用任务结果验证。</text>
  </g>
</svg>
